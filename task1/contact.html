<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact | Bharath</title>

    <link rel="icon"
          href="images/profile.jpeg">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>" type="image/svg+xml">


</head>

<body style="font-family: Arial;
             background-color: lightgray;">

    <h1 style="text-align: center;">
        Contact Me
    </h1>

    <hr>

    <nav style="text-align: center;">

        <a href="index.html">Home</a> |
        <a href="about.html">About</a> |
        <a href="projects.html">Projects</a> |
        <a href="contact.html">Contact</a>

    </nav>

    <hr>

    <section style="text-align: center;">

        <h2>
            Contact Form
        </h2>

        <form style="display: inline-block;
                     text-align: left;">

            <label for="name">
                Full Name
            </label>

            <br>

            <input type="text"
                   id="name"
                   name="name">

            <br><br>

            <label for="email">
                Email
            </label>

            <br>

            <input type="email"
                   id="email"
                   name="email">

            <br><br>

            <label for="phone">
                Phone Number
            </label>

            <br>

            <input type="tel"
                   id="phone"
                   name="phone">

            <br><br>

            <label for="subject">
                Subject
            </label>

            <br>

            <select id="subject"
                    name="subject">

                <option>
                    HTML Help
                </option>

                <option>
                    Internship
                </option>

                <option>
                    Project Discussion
                </option>

                <option>
                    General Inquiry
                </option>

            </select>

            <br><br>

            <label for="message">
                Message
            </label>

            <br>

            <textarea id="message"
                      name="message"
                      rows="5"
                      cols="30">
            </textarea>

            <br><br>

            <input type="submit"
                   value="Send Message">

        </form>

    </section>

    <hr>

    <footer style="text-align: center;">

        <p>
            © 2026 Bharath Portfolio
        </p>

    </footer>

</body>

</html>
